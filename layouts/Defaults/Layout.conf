# ==============================================================================
# LAYOUT & SWAYFX RENDERING
# ==============================================================================

# SwayFX specific eye-candy
corner_radius 12
blur enable
blur_passes 3
blur_radius 4
blur_xray disable

shadows enable
shadows_on_csd enable
shadow_blur_radius 15
shadow_color #00000099

default_dim_inactive 0.05
smart_corner_radius enable

# Gaps and Borders
gaps inner 10
gaps outer 5
smart_gaps on

default_border pixel 2
default_floating_border pixel 2
hide_edge_borders smart

# Layer shell effects (Applies blur and shadows to UI panels)
layer_effects "waybar" blur enable; shadows enable; corner_radius 10
layer_effects "wofi" blur enable; shadows enable; corner_radius 12
layer_effects "notifications" blur enable; shadows enable; corner_radius 12

# Window Theme Colors (Variables are populated by the Python Theme Engine)
# class                 border      backgr.     text        indicator   child_border
client.focused          $color4     $color4     $background $color4     $color4
client.focused_inactive $color8     $color8     $foreground $color8     $color8
client.unfocused        $background $background $foreground $background $background
client.urgent           $color1     $color1     $foreground $color1     $color1

# Hardware Defaults
input type:touchpad {
    tap enabled
    natural_scroll enabled
}

# Auto-start essential background services
exec_always mako # Notification daemon
exec_always waybar # Status bar
