# =========================================================
# LAYOUT: Classic Top
# BEHAVIOR: Standard Tiling + Top Status Bar + Gaps
# =========================================================

# --- Typography Application ---
font pango:$font-ui

# --- Window Styling ---
default_border pixel $border-width
default_floating_border pixel $border-width

# Window Colors (Pulled dynamically from loaded theme variables)
client.focused          $state-focused
client.focused_inactive $state-inactive
client.unfocused        $state-inactive
client.urgent           $state-urgent
client.placeholder      $state-inactive

# --- Gaps & Spacing ---
gaps inner $gap-inner
gaps outer $gap-outer
smart_gaps on
smart_borders on
hide_edge_borders smart

# --- Status Bar ---
bar {
    position top
    font pango:$font-ui
    
    # Strips out standard system tray to enforce minimal aesthetics
    tray_output none

    colors {
        background $bg-base
        statusline $text-main
        separator  $text-muted

        # Workspace states
        #                  Border          Background      Text
        focused_workspace  $border-active  $accent-neon    $bg-base
        active_workspace   $bg-surface     $bg-surface     $text-main
        inactive_workspace $bg-base        $bg-base        $text-muted
        urgent_workspace   $accent-warn    $accent-warn    $bg-base
        binding_mode       $accent-neon    $accent-neon    $bg-base
    }
}

# --- Layout Rules ---
# Float popups and dialogs by default so they don't break the grid
for_window [window_role="pop-up"] floating enable
for_window [window_role="dialog"] floating enable
for_window [window_type="dialog"] floating enable
for_window [class="(?i)pinentry"] floating enable
