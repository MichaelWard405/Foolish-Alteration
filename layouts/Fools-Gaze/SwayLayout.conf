# =========================================================
# LAYOUT: Classic Top
# =========================================================

# --- Typography Application ---
font pango:$font-ui

# --- Window Styling ---
default_border pixel $border-width
default_floating_border pixel $border-width

# Window Colors (Explicitly mapped to avoid variable expansion errors)
#                       Border          Background      Text            Indicator       Child Border
client.focused          $border-active  $bg-surface     $text-main      $accent-peach   $border-active
client.focused_inactive $border-idle    $bg-base        $text-muted     $border-idle    $border-idle
client.unfocused        $border-idle    $bg-base        $text-muted     $border-idle    $border-idle
client.urgent           $accent-warn    $bg-base        $bg-base        $accent-warn    $accent-warn
client.placeholder      $border-idle    $bg-base        $text-muted     $border-idle    $border-idle

# --- Gaps & Spacing ---
gaps inner $gap-inner
gaps outer $gap-outer
smart_gaps on
smart_borders on
hide_edge_borders smart

# --- Layout Rules ---
for_window [window_role="pop-up"] floating enable
for_window [window_role="dialog"] floating enable
for_window [window_type="dialog"] floating enable
for_window [class="(?i)pinentry"] floating enable
for_window [app_id="pavucontrol"] floating enable, resize set 700 450, move position 1200 px 50 px
for_window [app_id=".blueman-manager-wrapped"] floating enable, resize set 650 420, move position 1250 px 50 px
for_window [app_id="blueman-manager"] floating enable, resize set 650 420, move position 1250 px 50 px
for_window [title="btop_float"] floating enable, resize set 850 550, move position 1050 px 50 px
for_window [title="nmtui_float"] floating enable, resize set 700 450, move position 1200 px 50 px
for_window [app_id="gcalcli_float"] floating enable, resize set 450 400, move position 1400 px 50 px

