# =========================================================
# THEME: Fools Gaze (Dark)
# STYLE: Retro-Futuristic / Cyber-Grid
# =========================================================

# --- Palette ---
set $bg-base       #080811
set $bg-surface    #10101c
set $text-main     #00ffcc
set $text-muted    #00997a
set $accent-neon   #ff00ff
set $accent-warn   #ffcc00
set $border-idle   #20203a
set $border-active #ff00ff

# --- Typography ---
# Blocky character font for the retro terminal vibe
set $font-ui "VT323 14"
set $font-term "VT323 16"

# --- Metrics ---
set $border-width 3
set $gap-inner 10
set $gap-outer 5

# --- Assets & Desktop ---
set $icon-theme "Papirus-Dark"
set $cursor-theme "Phinger-Cursors-Dark"

# --- Element States ---
# Order:            Border          Background      Text           Indicator      Child Border
set $state-focused  $border-active  $bg-surface     $text-main     $accent-neon   $border-active
set $state-inactive $border-idle    $bg-base        $text-muted    $border-idle   $border-idle
set $state-urgent   $accent-warn    $bg-base        $bg-base       $accent-warn   $accent-warn
