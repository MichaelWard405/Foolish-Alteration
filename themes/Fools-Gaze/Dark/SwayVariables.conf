# =========================================================
# THEME: Fools Gaze (Retro Pastel Red Variant)
# =========================================================

# --- Palette ---
set $bg-base       #141111
set $bg-surface    #1f1a1a
set $text-main     #f4eaea
set $text-muted    #857070
set $accent-red    #ff6b6b
set $accent-peach  #ffb37b
set $accent-warn   #ef4444
set $border-idle   #332929
set $border-active #ff6b6b

# --- Typography ---
set $font-ui VT323 14
set $font-term VT323 16

# --- Metrics ---
set $border-width 3
set $gap-inner 10
set $gap-outer 5
